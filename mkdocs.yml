site_name: S32K Automotive Embedded Mastery Path
site_description: A structured, module-wise automotive embedded training program from entry level to master level, built around NXP's S32K microcontroller family — real C code, CAN bus, functional safety, and ECU design from the first lesson.
site_url: https://sigilipelli.github.io/s32k-mastery-path/
repo_url: https://github.com/SIGILIPELLI/s32k-mastery-path
repo_name: s32k-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Automotive Embedded & the S32K Family": level-1/01-automotive-landscape-s32k.md
      - "02 · Toolchain Setup — S32 Design Studio": level-1/02-toolchain-s32-design-studio.md
      - "03 · Clocks, Power & Boot": level-1/03-clocks-power-boot.md
      - "04 · GPIO & Pin Muxing": level-1/04-gpio-pin-muxing.md
      - "05 · UART Communication": level-1/05-uart-communication.md
      - "06 · ADC & Sensor Inputs": level-1/06-adc-sensor-inputs.md
      - "07 · CAN Fundamentals": level-1/07-can-fundamentals.md
      - "08 · Timers & PWM": level-1/08-timers-pwm.md
      - "09 · Safety & Robustness Basics": level-1/09-safety-robustness.md
      - "10 · Capstone — CAN Sensor Node": level-1/10-capstone-can-sensor-node.md
